<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Página Bonita</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #4A90E2;
            color: white;
            padding: 20px;
        }
        main {
            padding: 40px;
        }
        h1 {
            color: #333;
        }
        p {
            font-size: 18px;
            color: #555;
        }
        button {
            background-color: #4A90E2;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #357ABD;
        }
        footer {
            background-color: #f1f1f1;
            padding: 15px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>
    <header>
        <h2>Bienvenido a la página de Andrea</h2>
    </header>
    <main>
        <h1>Hola Mundo 🌍</h1>
        <p>Este es un ejemplo de página HTML.</p>
        <button>Haz clic aquí</button>
    </main>
    <footer>
        <p>© 2026 Mi Página</p>
    </footer>
</body>
</html>
